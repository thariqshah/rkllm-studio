services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
    # Use host network to fix DNS and connectivity issues on the board
    network_mode: host
    volumes:
      - ../models:/app/models
    devices:
      - "/dev/rknn:/dev/rknn"
    restart: unless-stopped
    environment:
      - RUST_LOG=info

  frontend:
    image: node:20-slim
    working_dir: /app
    # Use host network for the frontend as well
    network_mode: host
    volumes:
      - ../frontend:/app
    # Note: Since we are in host mode, ports are exposed automatically on 3000 and 8080
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    restart: unless-stopped
