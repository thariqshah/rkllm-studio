services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile
      # This fixes the DNS issues during the 'apt-get' build phase
      network: host
    network_mode: host
    volumes:
      - ../models:/app/models
    devices:
      - "/dev/rknn:/dev/rknn"
    restart: unless-stopped
    environment:
      - RUST_LOG=info

  frontend:
    build:
      context: ../frontend
      # Also use host network for frontend build if needed
      network: host
    image: node:20-slim
    working_dir: /app
    network_mode: host
    volumes:
      - ../frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    restart: unless-stopped
